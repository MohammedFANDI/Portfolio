<div
  class="grid xs:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 p-16"
>
  @for (contact of (contacts | async); track $index) {
  <div class="card bg-base-100 shadow-xl m-3">
    <div class="card-body">
      <h1>{{ contact.name }}</h1>
      <p>{{ contact.phone }}</p>
      <div class="card-actions justify-end">
        <app-contact-actions [contact]="contact"></app-contact-actions>
      </div>
    </div>
  </div>
  }
</div>
